# .github/workflows/docx-ci.yml
name: DOCX Integration CI
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  docx-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm ci
      - name: Build Next
        run: npm run build
      - name: Start app
        run: npm run start &>/tmp/next-start.log & echo $! > .pid
      - name: Wait for server
        uses: jakejarvis/wait-action@v0.2.1
        with:
          url: http://localhost:3000
          timeout: 30
      - name: Download test docx
        run: |
          curl -s -X GET "http://localhost:3000/api/generate/passport-docx/test" -o test-passport.docx
          ls -l test-passport.docx
      - name: Validate docx
        run: node scripts/checkDocx.js test-passport.docx
      - name: Shutdown server
        if: always()
        run: |
          if [ -f .pid ]; then kill $(cat .pid) || true; fi
